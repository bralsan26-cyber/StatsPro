<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Stats IA - Pro Scouter</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --panel: #111318; --card: #161b24; --border: #1e2533;
    --accent: #00e5a0; --accent2: #ff4d6d; --text: #e8eaf0; --muted: #5a6278;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
  
  /* Sidebar */
  .sidebar { width: 300px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; }
  .logo { font-family: 'Bebas Neue', cursive; font-size: 2.2rem; color: var(--accent); margin-bottom: 30px; letter-spacing: 1px; }
  .upload-box { background: var(--card); border: 1px dashed var(--border); padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: center; }
  .upload-box p { font-size: 0.8rem; margin-bottom: 10px; color: var(--muted); }
  .btn-file { background: var(--border); color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 0.85rem; display: inline-block; }
  .btn-file:hover { background: var(--accent); color: #000; }
  input[type="file"] { display: none; }
  .status { font-size: 0.75rem; margin-top: 8px; font-weight: bold; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; padding: 30px; position: relative; }
  .chat-wrap { flex: 1; background: var(--panel); border-radius: 15px; border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  #chat-output { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
  
  /* Balões de Chat */
  .msg { max-width: 85%; padding: 12px 18px; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; }
  .msg-user { align-self: flex-end; background: var(--accent); color: #000; font-weight: 500; }
  .msg-ai { align-self: flex-start; background: var(--card); border: 1px solid var(--border); color: var(--text); width: 100%; }

  .input-area { padding: 20px; background: var(--card); border-top: 1px solid var(--border); display: flex; gap: 10px; }
  #user-query { flex: 1; background: var(--bg); border: 1px solid var(--border); padding: 15px; border-radius: 10px; color: white; outline: none; }
  #user-query:focus { border-color: var(--accent); }
  #send-btn { background: var(--accent); color: #000; border: none; padding: 0 25px; border-radius: 10px; font-weight: 600; cursor: pointer; }

  /* Tabelas IA */
  .ia-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden; }
  .ia-table th { background: var(--border); padding: 10px; text-align: left; font-size: 0.8rem; color: var(--muted); text-transform: uppercase; }
  .ia-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
  .val-highlight { color: var(--accent); font-weight: bold; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">STATS IA</div>
  
  <div class="upload-box">
    <p>ARQUIVO HISTÓRICO</p>
    <label class="btn-file" for="f-hist">Upload CSV</label>
    <input type="file" id="f-hist" accept=".csv">
    <div id="s-hist" class="status" style="color:var(--accent2)">Não carregado</div>
  </div>

  <div class="upload-box">
    <p>PRÓXIMOS JOGOS</p>
    <label class="btn-file" for="f-next">Upload CSV</label>
    <input type="file" id="f-next" accept=".csv">
    <div id="s-next" class="status" style="color:var(--accent2)">Não carregado</div>
  </div>

  <div style="margin-top: auto; font-size: 0.8rem; color: var(--muted); line-height: 1.4;">
    <strong>Comandos sugeridos:</strong><br>
    • "Gols no primeiro tempo"<br>
    • "Mais de 10 cantos no jogo"<br>
    • "Menos de 2 cantos em 10 min"<br>
    • "Finalizações no 1º tempo"
  </div>
</div>

<div class="main">
  <div class="chat-wrap">
    <div id="chat-output">
      <div class="msg msg-ai">Olá! Carregue seus arquivos CSV e me peça uma análise de mercado para a próxima rodada.</div>
    </div>
    <div class="input-area">
      <input type="text" id="user-query" placeholder="O que deseja analisar na rodada?">
      <button id="send-btn">ANALISAR</button>
    </div>
  </div>
</div>

<script>
let historicalData = [];
let nextMatches = [];

// Parser de CSV inteligente
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
  const headers = lines[0].split(';');
  return lines.slice(1).map(line => {
    const values = line.split(';');
    let obj = {};
    headers.forEach((h, i) => obj[h.trim()] = values[i] ? values[i].trim() : "");
    return obj;
  });
}

// Upload Listeners
document.getElementById('f-hist').addEventListener('change', function(e) {
  const reader = new FileReader();
  reader.onload = (ev) => {
    historicalData = parseCSV(ev.target.result);
    document.getElementById('s-hist').innerText = "✓ " + historicalData.length + " Registros";
    document.getElementById('s-hist').style.color = "var(--accent)";
  };
  reader.readAsText(e.target.files[0]);
});

document.getElementById('f-next').addEventListener('change', function(e) {
  const reader = new FileReader();
  reader.onload = (ev) => {
    nextMatches = parseCSV(ev.target.result);
    document.getElementById('s-next').innerText = "✓ " + nextMatches.length + " Jogos";
    document.getElementById('s-next').style.color = "var(--accent)";
  };
  reader.readAsText(e.target.files[0]);
});

// CLASSIFICADOR DE INTENÇÃO (O "Cérebro" da IA)
function intentClassifier(query) {
    const q = query.toLowerCase();
    if (q.includes('canto') || q.includes('escanteio')) {
        if (q.includes('10 min')) return "CORNERS_10";
        if (q.includes('primeiro tempo') || q.includes('pt')) return "CORNERS_HT";
        if (q.includes('segundo tempo') || q.includes('st')) return "CORNERS_ST";
        return "CORNERS_FT";
    }
    if (q.includes('gol')) {
        if (q.includes('primeiro tempo') || q.includes('pt')) return "GOLS_HT";
        return "GOLS_FT";
    }
    if (q.includes('cartão') || q.includes('amarelo')) return "CARDS";
    if (q.includes('finalização') || q.includes('chute')) return "SHOTS";
    return "UNKNOWN";
}

// MOTOR DE CÁLCULO PONDERADO
function analisarMercado(titulo, config) {
    if (historicalData.length === 0 || nextMatches.length === 0) return "⚠️ Erro: Carregue os dois arquivos CSV para analisar.";
    
    let sugestoes = [];
    nextMatches.forEach(proximo => {
        const casa = proximo.Casa;
        const vis = proximo.Visitante;

        // Filtra histórico (Casa como Mandante / Vis como Visitante)
        const hCasa = historicalData.filter(d => d.Jogo.startsWith(casa));
        const hVis = historicalData.filter(d => d.Jogo.endsWith(vis));

        if (hCasa.length >= 2 && hVis.length >= 2) {
            const calcHits = (data) => data.filter(d => {
                const soma = config.colunas.reduce((acc, col) => acc + (parseFloat(d[col]) || 0), 0);
                return config.isOver ? soma > config.limit : soma < config.limit;
            }).length;

            const pCasa = (calcHits(hCasa) / hCasa.length) * 100;
            const pVis = (calcHits(hVis) / hVis.length) * 100;
            const media = (pCasa + pVis) / 2;

            if (media > 50) { 
                sugestoes.push({ jogo: `${casa} x ${vis}`, prob: media, info: `${pCasa.toFixed(0)}% / ${pVis.toFixed(0)}%` });
            }
        }
    });

    if (sugestoes.length === 0) return "Nenhuma entrada com probabilidade relevante encontrada para " + titulo;

    sugestoes.sort((a, b) => b.prob - a.prob);

    let html = `<div><strong>📊 Análise IA: ${titulo}</strong></div>`;
    html += `<table class="ia-table"><thead><tr><th>Jogo</th><th>Confiança</th><th>H. Individual</th></tr></thead><tbody>`;
    sugestoes.forEach(s => {
        html += `<tr><td>${s.jogo}</td><td class="val-highlight">${s.prob.toFixed(1)}%</td><td>${s.info}</td></tr>`;
    });
    return html + `</tbody></table>`;
}

// EXECUÇÃO DO CHAT
document.getElementById('send-btn').addEventListener('click', () => {
    const input = document.getElementById('user-query');
    const output = document.getElementById('chat-output');
    const query = input.value.trim();
    if (!query) return;

    // Interface: Msg do Usuário
    output.innerHTML += `<div class="msg msg-user">${query}</div>`;
    
    // IA Processando
    const intent = intentClassifier(query);
    const isUnder = query.toLowerCase().includes('menos') || query.toLowerCase().includes('under');
    let response = "";

    switch (intent) {
        case "CORNERS_10":
            response = analisarMercado("Cantos 10 min (U1.5)", { colunas: ['C10_Casa', 'C10_Vis'], limit: 1.5, isOver: false });
            break;
        case "CORNERS_HT":
            response = analisarMercado("Cantos HT (>4)", { colunas: ['Canto_C_PT', 'Canto_V_PT'], limit: 4, isOver: !isUnder });
            break;
        case "CORNERS_FT":
            response = analisarMercado("Cantos Totais (>10)", { colunas: ['Canto_C_PT', 'Canto_V_PT', 'Canto_C_ST', 'Canto_V_ST'], limit: 10, isOver: !isUnder });
            break;
        case "GOLS_HT":
            response = analisarMercado("Gols HT (>0.5)", { colunas: ['Gols_C_PT', 'Gols_V_PT'], limit: 0.5, isOver: !isUnder });
            break;
        case "GOLS_FT":
            const gLim = isUnder ? 4.5 : 1.5;
            response = analisarMercado(`Gols FT (${isUnder ? '<4.5' : '>1.5'})`, { colunas: ['Gols_C_PT', 'Gols_V_PT', 'Gols_C_ST', 'Gols_V_ST'], limit: gLim, isOver: !isUnder });
            break;
        case "CARDS":
            response = analisarMercado("Cartões Amarelos (1+ p/ cada)", { colunas: ['Amarelo_Casa_PT', 'Amarelo_Vis_PT', 'Amarelo_Casa_ST', 'Amarelo_Vis_ST'], limit: 1.5, isOver: true });
            break;
        case "SHOTS":
            const sLim = isUnder ? 15 : 9;
            response = analisarMercado(`Finalizações HT (${isUnder ? '<15' : '>9'})`, { colunas: ['On_C_PT', 'Off_C_PT', 'On_V_PT', 'Off_V_PT'], limit: sLim, isOver: !isUnder });
            break;
        default:
            response = "Ainda não fui treinado para esse mercado específico. Tente perguntar sobre Cantos, Gols, Cartões ou Finalizações!";
    }

    output.innerHTML += `<div class="msg msg-ai">${response}</div>`;
    input.value = "";
    output.scrollTop = output.scrollHeight;
});
</script>
</body>
</html>
